<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Campfly</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg);
        margin: 0;
      }
      .auth-page-container {
        width: 100%;
        max-width: 440px;
        padding: 1rem;
      }
      .auth-modal {
        position: relative;
        transform: none;
        top: auto;
        left: auto;
        width: 100%;
        max-width: 100%;
      }
      .message-box {
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        display: none;
      }
      .message-box.success {
        display: block;
        background: #d1fae5;
        color: #065f46;
        border: 1px solid #34d399;
      }
      .message-box.error {
        display: block;
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #f87171;
      }
    </style>
    <link rel="icon" type="image/png" href="assets/logo-cropped.png">
</head>
  <body>
    <div class="auth-page-container">
      <div class="auth-modal">
        <div class="auth-header" style="text-align: center;">
          <a href="index.html" style="display: inline-block; margin-bottom: 1.5rem;">
            <img src="assets/logo-cropped.png" alt="Campfly" height="32" style="width: auto;" />
          </a>
          <h2>Reset Password</h2>
          <p>Enter your email address and we'll send you a link to reset your password.</p>
        </div>
        
        <div id="status-message" class="message-box"></div>

        <form id="forgot-password-form">
          <div class="auth-form-group">
            <label for="fp-email">Email Address</label>
            <input type="email" id="fp-email" placeholder="name@example.com" required />
          </div>
          <button type="submit" class="solid auth-btn" id="fp-submit-btn">Send Reset Link</button>
        </form>
        
        <div class="auth-footer" style="margin-top: 1.5rem;">
          Remember your password? <a href="index.html">Back to Login</a>
        </div>
      </div>
    </div>

    <script src="forgot-password.js"></script>
  </body>
</html>
